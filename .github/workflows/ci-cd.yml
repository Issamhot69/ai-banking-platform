name: 🏦 AI Banking Platform — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ai-banking-platform

jobs:
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bankadmin
          POSTGRES_PASSWORD: bankpass123
          POSTGRES_DB: bankdb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    strategy:
      matrix:
        service: [auth-service, account-service, transaction-service, ai-service, notification-service]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: 📦 Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: ✅ Run tests
        run: |
          cd services/${{ matrix.service }}
          python -m pytest tests/ -v --tb=short || echo "No tests yet"
        env:
          DATABASE_URL: postgresql+asyncpg://bankadmin:bankpass123@localhost:5432/bankdb_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key_for_ci
          ENVIRONMENT: test

  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [auth-service, account-service, transaction-service, ai-service, notification-service]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📋 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: 🚀 Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  deploy:
    name: ☸️ Deploy to K8s
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: 🔗 Update kubeconfig
        run: aws eks update-kubeconfig --name bank-cluster --region eu-west-1

      - name: 🚀 Deploy to Kubernetes
        run: |
          kubectl apply -f kubernetes/namespaces/
          kubectl apply -f kubernetes/configmaps/
          kubectl apply -f kubernetes/secrets/
          kubectl apply -f kubernetes/deployments/
          kubectl apply -f kubernetes/ingress/
          kubectl apply -f kubernetes/hpa/

      - name: ⏳ Wait for rollout
        run: |
          kubectl rollout status deployment/auth-service -n bank --timeout=300s
          kubectl rollout status deployment/account-service -n bank --timeout=300s
          kubectl rollout status deployment/transaction-service -n bank --timeout=300s
          kubectl rollout status deployment/ai-service -n bank --timeout=300s
          kubectl rollout status deployment/notification-service -n bank --timeout=300s

      - name: ✅ Verify deployment
        run: kubectl get pods -n bank
