name: 🏦 AI Banking Platform — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  test-original:
    name: 🧪 Test Original Services
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bankadmin
          POSTGRES_PASSWORD: bankpass123
          POSTGRES_DB: bankdb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    strategy:
      matrix:
        service: [auth-service, account-service, transaction-service, notification-service, ai-service]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt -r tests/requirements-test.txt

      - name: 🧪 Run tests
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql+asyncpg://bankadmin:bankpass123@localhost:5432/bankdb_test
          SECRET_KEY: test_secret_key_for_ci_min32characters
          ENVIRONMENT: test
          DEBUG: "false"
          PYTHONPATH: .
        run: python -m pytest tests/ -v

  test-new:
    name: 🧪 Test New Services
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bankadmin
          POSTGRES_PASSWORD: bankpass123
          POSTGRES_DB: bankdb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    strategy:
      matrix:
        service: [kyc-service, audit-service, card-service, swift-service, sepa-service, loan-service, crypto-service, crm-service]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt -r tests/requirements-test.txt

      - name: 🧪 Run tests
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql+asyncpg://bankadmin:bankpass123@localhost:5432/bankdb_test
          SECRET_KEY: test_secret_key_for_ci_min32characters
          ENVIRONMENT: test
          DEBUG: "false"
          ANTHROPIC_API_KEY: test_key
          PYTHONPATH: .
        run: python -m pytest tests/ -v

  test-security:
    name: 🧪 Test Security Service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bankadmin
          POSTGRES_PASSWORD: bankpass123
          POSTGRES_DB: bankdb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        working-directory: services/security-service
        run: pip install -r requirements.txt -r tests/requirements-test.txt

      - name: 🧪 Run tests
        working-directory: services/security-service
        env:
          DATABASE_URL: postgresql+asyncpg://bankadmin:bankpass123@localhost:5432/bankdb_test
          SECRET_KEY: test_secret_key_for_ci_min32characters
          ENVIRONMENT: test
          DEBUG: "false"
          REDIS_URL: redis://localhost:6379/5
          PYTHONPATH: .
        run: python -m pytest tests/ -v

  build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-original, test-new, test-security]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - auth-service
          - account-service
          - transaction-service
          - ai-service
          - notification-service
          - kyc-service
          - audit-service
          - card-service
          - swift-service
          - sepa-service
          - security-service
          - loan-service
          - crypto-service
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📋 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: 🚀 Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 🚀 Deploy to AWS EKS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && vars.AWS_DEPLOY_ENABLED == 'true'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: 🔗 Update kubeconfig
        run: aws eks update-kubeconfig --name bank-cluster --region eu-west-1

      - name: 🚀 Deploy to Kubernetes
        run: |
          kubectl apply -f kubernetes/namespaces/
          kubectl apply -f kubernetes/configmaps/
          kubectl apply -f kubernetes/deployments/
          kubectl apply -f kubernetes/ingress/

      - name: ✅ Verify deployment
        run: kubectl get pods -n bank
