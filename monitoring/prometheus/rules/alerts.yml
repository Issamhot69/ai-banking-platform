groups:
  - name: banking-platform-alerts
    rules:
      - alert: ServiceDown
        expr: up{job!="node-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (job) / sum(rate(http_requests_total[5m])) by (job) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} has more than 5% of requests failing with 5xx over the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (job, le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"
          description: "{{ $labels.job }} p95 latency has exceeded 1 second for 5 minutes."

      - alert: FewServicesUp
        expr: sum(up{job!="node-exporter"}) < 14
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Not all banking services are healthy"
          description: "Only {{ $value }} out of 14 microservices are currently reporting up."
