version: '3.9'

networks:
  bank-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  kafka_data:

services:

  postgres:
    image: postgres:15-alpine
    container_name: bank_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bankadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bankpass123}
      POSTGRES_DB: ${POSTGRES_DB:-bankdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5435:5432"
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankadmin -d bankdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bank_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123}
    volumes:
      - redis_data:/data
    ports:
      - "6382:6379"
    networks:
      - bank-network

  mongodb:
    image: mongo:6-jammy
    container_name: bank_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-bankadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongopass123}
      MONGO_INITDB_DATABASE: bank_docs
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27018:27017"
    networks:
      - bank-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bank_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bank-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bank_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    networks:
      - bank-network

  gateway:
    image: nginx:alpine
    container_name: bank_gateway
    volumes:
      - ./gateway/config/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - bank-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: bank_auth
    environment:
      DATABASE_URL: postgresql+asyncpg://bankadmin:bankpass123@postgres:5432/bankdb
      REDIS_URL: redis://:redispass123@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "8001:8000"
    networks:
      - bank-network
    restart: unless-stopped

  account-service:
    build:
      context: ./services/account-service
      dockerfile: Dockerfile
    container_name: bank_account
    environment:
      DATABASE_URL: postgresql+asyncpg://bankadmin:bankpass123@postgres:5432/bankdb
      REDIS_URL: redis://:redispass123@redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8002:8000"
    networks:
      - bank-network
    restart: unless-stopped

  transaction-service:
    build:
      context: ./services/transaction-service
      dockerfile: Dockerfile
    container_name: bank_transaction
    environment:
      DATABASE_URL: postgresql+asyncpg://bankadmin:bankpass123@postgres:5432/bankdb
      REDIS_URL: redis://:redispass123@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8003:8000"
    networks:
      - bank-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: bank_notification
    environment:
      SECRET_KEY: ${SECRET_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MONGODB_URL: mongodb://bankadmin:mongopass123@mongodb:27017/bank_docs
    ports:
      - "8006:8000"
    networks:
      - bank-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: bank_ai
    environment:
      SECRET_KEY: ${SECRET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DATABASE_URL: postgresql+asyncpg://bankadmin:bankpass123@postgres:5432/bankdb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8007:8000"
    networks:
      - bank-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: bank_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - bank-network

  grafana:
    image: grafana/grafana:latest
    container_name: bank_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    ports:
      - "3000:3000"
    networks:
      - bank-network

  vault:
    image: hashicorp/vault:latest
    container_name: bank_vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "bank-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - bank-network
    command: server -dev

  kyc-service:
    build: ./services/kyc-service
    container_name: bank_kyc
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+asyncpg://bankadmin:bankpass123@postgres:5432/bankdb
      MONGODB_URL: mongodb://bankadmin:mongopass123@mongodb:27017/bank_docs
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8008:8000"
    networks:
      - bank-network
    depends_on:
      - postgres
      - mongodb
    restart: unless-stopped

  audit-service:
    build: ./services/audit-service
    container_name: bank_audit
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+asyncpg://bankadmin:bankpass123@postgres:5432/bankdb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8009:8000"
    networks:
      - bank-network
    depends_on:
      - postgres
    restart: unless-stopped

  card-service:
    build: ./services/card-service
    container_name: bank_card
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+asyncpg://bankadmin:bankpass123@postgres:5432/bankdb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8010:8000"
    networks:
      - bank-network
    depends_on:
      - postgres
    restart: unless-stopped

  swift-service:
    build: ./services/swift-service
    container_name: bank_swift
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+asyncpg://bankadmin:bankpass123@postgres:5432/bankdb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8011:8000"
    networks:
      - bank-network
    depends_on:
      - postgres
    restart: unless-stopped
