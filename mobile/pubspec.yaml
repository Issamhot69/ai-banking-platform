name: ai_banking
description: AI Banking Platform — Mobile App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  fl_chart: ^0.67.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  local_auth: ^2.2.0
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.2
  flutter_local_notifications: ^17.1.2
  web_socket_channel: ^3.0.0
  intl: ^0.19.0
  uuid: ^4.4.0
  pin_code_fields: ^8.0.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
