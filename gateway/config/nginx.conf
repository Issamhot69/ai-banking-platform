events { worker_connections 1024; }

http {
    resolver 127.0.0.11 valid=30s ipv6=off;

    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    server {
        listen 80;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;

        set $auth_upstream        http://auth-service:8000;
        set $account_upstream     http://account-service:8000;
        set $transaction_upstream http://transaction-service:8000;
        set $notification_upstream http://notification-service:8000;
        set $ai_upstream          http://ai-service:8000;

        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass $auth_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        location /api/v1/accounts/ {
            proxy_pass $account_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/transactions/ {
            proxy_pass $transaction_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/notifications/ {
            proxy_pass $notification_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/ai/ {
            proxy_pass $ai_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            return 200 '{"status":"ok","service":"bank-gateway","version":"1.0.0"}';
            add_header Content-Type application/json;
        }

        location / {
            return 200 '{"message":"AI Banking Platform API"}';
            add_header Content-Type application/json;
        }
    }
}
