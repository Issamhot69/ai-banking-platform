events { worker_connections 1024; }

http {
    upstream auth_service        { server auth-service:8000; }
    upstream account_service     { server account-service:8000; }
    upstream transaction_service { server transaction-service:8000; }
    upstream notification_service{ server notification-service:8000; }
    upstream ai_service          { server ai-service:8000; }

    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    server {
        listen 80;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;

        location /api/v1/auth/         { limit_req zone=auth burst=10 nodelay; proxy_pass http://auth_service/; }
        location /api/v1/accounts/     { limit_req zone=api  burst=20;         proxy_pass http://account_service/; }
        location /api/v1/transactions/ { limit_req zone=api  burst=20;         proxy_pass http://transaction_service/; }
        location /api/v1/notifications/{ limit_req zone=api  burst=20;         proxy_pass http://notification_service/; }
        location /api/v1/ai/           { limit_req zone=api  burst=10;         proxy_pass http://ai_service/; }

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
