<text class="ts" x="525" y="420" text-anchor="middle" dominant-baseline="central" fill="#712B13">Credit scoring</text>

<rect x="40" y="480" width="600" height="120" rx="20" fill="none" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="60" y="504" fill="#04342C">Risk &amp; compliance</text>

<rect x="60" y="520" width="120" height="56" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="120" y="538" text-anchor="middle" dominant-baseline="central" fill="#04342C">KYC</text>
<text class="ts" x="120" y="556" text-anchor="middle" dominant-baseline="central" fill="#085041">Identity checks</text>

<rect x="195" y="520" width="120" height="56" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="255" y="538" text-anchor="middle" dominant-baseline="central" fill="#04342C">Audit</text>
<text class="ts" x="255" y="556" text-anchor="middle" dominant-baseline="central" fill="#085041">Immutable logs</text>

<rect x="330" y="520" width="120" height="56" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="390" y="538" text-anchor="middle" dominant-baseline="central" fill="#04342C">Security</text>
<text class="ts" x="390" y="556" text-anchor="middle" dominant-baseline="central" fill="#085041">Rate limiting</text>

<rect x="465" y="520" width="120" height="56" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="525" y="538" text-anchor="middle" dominant-baseline="central" fill="#04342C">Crypto</text>
<text class="ts" x="525" y="556" text-anchor="middle" dominant-baseline="central" fill="#085041">BTC, ETH, SOL</text>

<rect x="40" y="616" width="285" height="56" rx="20" fill="none" stroke="#993556" stroke-width="0.5"/>
<text class="th" x="56" y="638" fill="#4B1528">Engagement</text>
<rect x="135" y="624" width="100" height="40" rx="10" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text class="th" x="185" y="638" text-anchor="middle" dominant-baseline="central" fill="#4B1528">CRM</text>
<text class="ts" x="185" y="654" text-anchor="middle" dominant-baseline="central" fill="#72243E">Profiles</text>

<rect x="395" y="624" width="225" height="40" rx="10" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text class="th" x="507" y="638" text-anchor="middle" dominant-baseline="central" fill="#4B1528">Notification</text>
<text class="ts" x="507" y="654" text-anchor="middle" dominant-baseline="central" fill="#72243E">Push, email, SMS</text>

<line x1="340" y1="328" x2="340" y2="340" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="464" x2="340" y2="476" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="60" y="696" width="560" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="718" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">PostgreSQL · Redis · Kafka · MongoDB</text>
<line x1="340" y1="600" x2="340" y2="692" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
