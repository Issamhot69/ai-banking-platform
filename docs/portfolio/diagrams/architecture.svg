<text class="ts" x="120" y="420" text-anchor="middle" dominant-baseline="central" fill="#712B13">Virtual Visa/MC</text>

<rect x="195" y="384" width="120" height="56" rx="12" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text class="th" x="255" y="402" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">SWIFT</text>
<text class="ts" x="255" y="420" text-anchor="middle" dominant-baseline="central" fill="#712B13">MT103 transfers</text>

<rect x="330" y="384" width="120" height="56" rx="12" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
