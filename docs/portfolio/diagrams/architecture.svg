<svg width="100%" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AI Banking Platform architecture diagram</title>
<desc>Client apps connect through an API gateway to 14 FastAPI microservices grouped into four domains: core banking, payments, risk and compliance, and engagement. All services share PostgreSQL, Redis, Kafka and MongoDB.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.th { font-size: 14px; font-weight: 500; }
.ts { font-size: 12px; }
</style>

<rect x="240" y="20" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Client apps</text>
<text class="ts" x="340" y="78" text-anchor="middle" fill="#5F5E5A">Web dashboard, mobile, partner APIs</text>

<line x1="340" y1="64" x2="340" y2="118" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="220" y="118" width="240" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central" fill="#26215C">API gateway</text>
<text class="ts" x="340" y="178" text-anchor="middle" fill="#5F5E5A">Routing, JWT validation, rate limiting</text>

<line x1="340" y1="162" x2="340" y2="208" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="208" width="600" height="120" rx="20" fill="none" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="60" y="232" fill="#26215C">Core banking</text>

<rect x="60" y="248" width="120" height="56" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="120" y="266" text-anchor="middle" dominant-baseline="central" fill="#26215C">Auth</text>
<text class="ts" x="120" y="284" text-anchor="middle" dominant-baseline="central" fill="#3C3489">JWT, 2FA</text>

<rect x="195" y="248" width="120" height="56" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="255" y="266" text-anchor="middle" dominant-baseline="central" fill="#26215C">Account</text>
<text class="ts" x="255" y="284" text-anchor="middle" dominant-baseline="central" fill="#3C3489">IBAN, balances</text>

<rect x="330" y="248" width="120" height="56" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="390" y="266" text-anchor="middle" dominant-baseline="central" fill="#26215C">Transaction</text>
<text class="ts" x="390" y="284" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Transfers, limits</text>

<rect x="465" y="248" width="120" height="56" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="525" y="266" text-anchor="middle" dominant-baseline="central" fill="#26215C">AI assistant</text>
<text class="ts" x="525" y="284" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Fraud, credit score</text>

<rect x="40" y="344" width="600" height="120" rx="20" fill="none" stroke="#D85A30" stroke-width="0.5"/>
